# Candidate-constrained learning loop — optimal ¥0 path (no Mac).
#
# Default synth provider: Groq free tier (Cloudflare Workers AI REST often 401s
# even with valid tokens on some accounts).
#
# Secret (once):
#   GROQ_API_KEY   from https://console.groq.com/keys  (free, no card)

name: Learning loop

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke | synth | retrain | full"
        type: choice
        options:
          - smoke
          - synth
          - retrain
          - full
        default: smoke
      per_target:
        description: "Sentences per target (default 1)"
        type: string
        default: "1"

permissions:
  contents: write

concurrency:
  group: learning-loop
  cancel-in-progress: false

env:
  LEARN_PROVIDER: groq

jobs:
  smoke:
    name: Smoke (ubuntu ¥0)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - run: npm run learn:autoloop -- --phase=smoke --provider groq --write-baseline
      - name: Summary
        run: |
          echo "## Smoke OK (¥0 Groq path)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Daily Groq synth + weekly retrain-lite" >> "$GITHUB_STEP_SUMMARY"
          echo "- No Mac / no paid GPU" >> "$GITHUB_STEP_SUMMARY"

  synth:
    name: Synth daily (Groq free)
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'synth' || github.event.inputs.mode == 'full'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Require Groq free secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::Set secret GROQ_API_KEY (https://console.groq.com/keys)"
            exit 1
          fi
          CODE=$(curl -s -o /tmp/groq-verify.json -w "%{http_code}" \
            https://api.groq.com/openai/v1/models \
            -H "Authorization: Bearer ${GROQ_API_KEY}")
          echo "groq_verify_http=$CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Groq auth failed (HTTP $CODE). Recreate key and: gh secret set GROQ_API_KEY"
            head -c 300 /tmp/groq-verify.json || true
            exit 1
          fi
          echo "Available chat models (sample):"
          node scripts/learning/check-groq-models.mjs /tmp/groq-verify.json
      - name: Generate × blind verify × arbitrate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LEARN_PROVIDER: groq
        run: |
          PER="${{ github.event.inputs.per_target }}"
          PER="${PER:-1}"
          npm run learn:autoloop -- --phase=synth --provider groq --per-target "$PER"
      - name: Commit corpus
        run: |
          git config user.name "yt-furigana-learning-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git add data/learning/corpus/synth-open.jsonl data/learning/gate-baseline.json || true
          if git diff --staged --quiet; then
            echo "No corpus changes"
          else
            git commit -m "chore(learning): append Groq free-tier synth corpus"
            git push
          fi

  retrain:
    name: Retrain-lite weekly (ubuntu ¥0)
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'retrain' || github.event.inputs.mode == 'full'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Merge + rule learn + 3-bench gate
        run: npm run learn:autoloop -- --phase=retrain-lite --write-baseline
      - name: Commit gate baseline + overrides
        run: |
          git config user.name "yt-furigana-learning-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git add \
            data/learning/gate-baseline.json \
            data/learning/corpus/synth-open.jsonl \
            data/generated/learned-overrides.json \
            || true
          if git diff --staged --quiet; then
            echo "No promote artifacts to commit"
          else
            git commit -m "chore(learning): promote after free eval gate"
            git push
          fi
