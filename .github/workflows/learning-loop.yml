# JRM learning loop — optimal ¥0 path (no Mac).
#
# Light usage profile:
#   - synth: once daily via Cloudflare Workers AI free (10k neurons/day)
#   - retrain-lite: weekly (rules + 3-bench; no ModernBERT GPU train)
#   - per_target=1 — plenty of headroom; do NOT upgrade to Workers Paid
#
# Secrets (Cloudflare free account, once):
#   CLOUDFLARE_ACCOUNT_ID
#   CLOUDFLARE_API_TOKEN

name: Learning loop

on:
  schedule:
    # Daily 04:00 UTC — light CF synth
    - cron: "0 4 * * *"
    # Weekly Monday 03:00 UTC — rule promote + benches
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke | synth | retrain | full"
        type: choice
        options:
          - smoke
          - synth
          - retrain
          - full
        default: smoke
      per_target:
        description: "Sentences per target (default 1)"
        type: string
        default: "1"

permissions:
  contents: write

concurrency:
  group: learning-loop
  cancel-in-progress: false

env:
  LEARN_PROVIDER: cloudflare

jobs:
  smoke:
    name: Smoke (ubuntu ¥0)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - run: npm run learn:autoloop -- --phase=smoke --write-baseline
      - name: Summary
        run: |
          echo "## Smoke OK (optimal ¥0 path)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Daily CF synth + weekly retrain-lite" >> "$GITHUB_STEP_SUMMARY"
          echo "- No Mac / no paid GPU" >> "$GITHUB_STEP_SUMMARY"

  synth:
    name: Synth daily (CF free)
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'synth' || github.event.inputs.mode == 'full'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Require Cloudflare free secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set secrets CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN (free account OK)"
            exit 1
          fi
      - name: Generate × blind verify × arbitrate
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          LEARN_PROVIDER: cloudflare
        run: |
          PER="${{ github.event.inputs.per_target }}"
          PER="${PER:-1}"
          npm run learn:autoloop -- --phase=synth --provider cloudflare --per-target "$PER"
      - name: Commit corpus
        run: |
          git config user.name "yt-furigana-learning-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git add data/learning/corpus/synth-open.jsonl data/learning/gate-baseline.json || true
          if git diff --staged --quiet; then
            echo "No corpus changes"
          else
            git commit -m "chore(learning): append CF free-tier synth corpus"
            git push
          fi

  retrain:
    name: Retrain-lite weekly (ubuntu ¥0)
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'retrain' || github.event.inputs.mode == 'full'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci || npm install
      - name: Merge + rule learn + 3-bench gate
        run: npm run learn:autoloop -- --phase=retrain-lite --write-baseline
      - name: Commit gate baseline + overrides
        run: |
          git config user.name "yt-furigana-learning-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" || true
          git add \
            data/learning/gate-baseline.json \
            data/learning/corpus/synth-open.jsonl \
            data/generated/learned-overrides.json \
            || true
          if git diff --staged --quiet; then
            echo "No promote artifacts to commit"
          else
            git commit -m "chore(learning): promote after free eval gate"
            git push
          fi
