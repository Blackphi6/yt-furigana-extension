# Free public reading API (Render Web Service).
# One-time: https://dashboard.render.com → New → Blueprint → this repo
services:
  - type: web
    name: yt-furigana-readings
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: reading-engine/deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: YT_FURIGANA_CORS_ORIGINS
        value: https://blackphi6.github.io,http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:5500,http://localhost:5500
      - key: YT_FURIGANA_RATE_LIMIT_PER_MIN
        value: "30"
      - key: YT_FURIGANA_RERANKER_PATH
        value: ""
