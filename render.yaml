# Free public reading API (Render Web Service).
# One-time: https://dashboard.render.com → New → Blueprint → this repo
#
# Important: Blueprint "Manual sync" only rebuilds when this file (or linked
# config) changes. For code-only fixes, open the web service and use
# Manual Deploy → Deploy latest commit.
services:
  - type: web
    name: yt-furigana-readings
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: reading-engine/deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: YT_FURIGANA_CORS_ORIGINS
        value: https://blackphi6.github.io,http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:5500,http://localhost:5500
      - key: YT_FURIGANA_RATE_LIMIT_PER_MIN
        value: "20"
      - key: YT_FURIGANA_RATE_LIMIT_GET_PER_MIN
        value: "60"
      - key: YT_FURIGANA_PUBLIC_READINGS
        value: "1"
      - key: YT_FURIGANA_RERANKER_PATH
        value: ""
      - key: YT_FURIGANA_CONTRIB_MIN_VOTES
        value: "3"
      - key: YT_FURIGANA_CONTRIB_COOLDOWN_SEC
        value: "30"
      - key: YT_FURIGANA_PROPOSAL_COOLDOWN_SEC
        value: "60"
      # Leave unset / empty → heuristic only, pending for admin promote
      - key: YT_FURIGANA_PROPOSAL_LLM
        value: "1"
      - key: YT_FURIGANA_PROPOSAL_AUTO_CURATE
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: YT_FURIGANA_ENV
        value: production
      - key: YT_FURIGANA_ALLOW_DRY_RUN
        value: "0"
      - key: YT_FURIGANA_ALLOW_DEMO_KEY
        value: "0"
      # Optional: comma-separated Premium keys that survive redeploys (free plan disk is ephemeral)
      - key: YT_FURIGANA_LICENSE_KEYS
        sync: false
      # Set in Dashboard (secret). Required for npm run publish:shared-readings
      - key: YT_FURIGANA_ADMIN_TOKEN
        sync: false
      # Bump this when you need Blueprint Manual sync to force a Docker rebuild
      - key: YT_FURIGANA_BUILD_ID
        value: "cws-120-20260722"
